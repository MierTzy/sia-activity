<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exploring Fake APIs</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="page">
    <section class="hero">
      <p class="eyebrow">SIA 1 Activity</p>
      <h1>Exploring APIs Using Fake Data</h1>
      <p class="subtitle">
        Personal information appears first, followed by user records fetched from a fake API.
      </p>
    </section>

    <section class="card">
      <div class="card-header">
        <div>
          <h2>User Table</h2>
          <p class="helper">Fields shown: ID, First Name, Last Name, Username, Email, Zipcode</p>
        </div>
        <button id="reloadButton" type="button">Reload Data</button>
      </div>

      <p id="statusMessage" class="status" aria-live="polite">Loading data...</p>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>First Name</th>
              <th>Last Name</th>
              <th>Username</th>
              <th>Email</th>
              <th>Zipcode</th>
            </tr>
          </thead>
          <tbody id="userTableBody"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
